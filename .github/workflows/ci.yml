name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: pip install -e '.[dev]'
      - name: Run tests (rendered-mode tests auto-skip without Playwright)
        run: python -m pytest tests -q

  test-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with render extra
        run: |
          pip install -e '.[dev,render]'
          python -m playwright install --with-deps chromium
      - name: Run full suite including rendered capture
        run: python -m pytest tests -q
      - name: Rebuild and verify checked-in demos without model calls
        env:
          OPENROUTER_API_KEY: ""
          AGENTIC_API_KEY: ""
          PYTHONPATH: src
        run: |
          unset OPENROUTER_API_KEY AGENTIC_API_KEY
          python demos/build_demos.py
          python demos/review_recorded_llm_run.py
          python demos/build_agent_runs.py
          python demos/verify_demos.py
          git diff --exit-code -- demos/packs demos/results demos/runs
          test -z "$(git status --porcelain --untracked-files=all -- demos/packs demos/results demos/runs)"
